spring.application.name=circulou-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/circulou_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:871210App*}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

# --- Actuator & Observability ---
# Exposi\u00E7\u00E3o dos endpoints do Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Detalhes de Sa\u00FAde (Seguran\u00E7a: apenas quando autorizado)
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# Grupos de Sa\u00FAde (Liveness e Readiness)
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db

# Info Contributors (Habilita informa\u00E7\u00F5es de build, java e so)
management.info.build.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.info.env.enabled=true

# Observabilidade Moderna (Spring Boot 3.5.x)
# Define tags globais para todas as observa\u00E7\u00F5es
management.observations.key-values.application=${spring.application.name}
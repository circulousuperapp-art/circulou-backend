spring.application.name=circulou-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/circulou_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:871210App*}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.jpa.open-in-view=false

# --- Database Pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.pool-name=CirculouHikariPool

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

server.port=${SERVER_PORT:8080}

# --- Actuator & Observability ---
# Exposi\u00E7\u00E3o dos endpoints do Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Detalhes de Sa\u00FAde e Probes (Seguran\u00E7a: detalhes apenas quando autorizado)
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# Grupos de Sa\u00FAde (Liveness e Readiness)
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db

# Info Contributors (Habilita informa\u00E7\u00F5es de build, java e so)
management.info.build.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
management.info.env.enabled=true

# Tracing e Logging
management.tracing.sampling.probability=1.0
management.tracing.enabled=true
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Observabilidade Moderna (Spring Boot 3.5.x)
# Define tags globais para todas as observa\u00E7\u00F5es
management.observations.key-values.application=${spring.application.name}

# --- Event Publisher Configuration ---
circulou.event.publisher.type=outbox
circulou.message.publisher.type=kafka
circulou.outbox.enabled=true
circulou.outbox.batch-size=100
circulou.outbox.interval-ms=5000
circulou.outbox.max-attempts=5
circulou.outbox.retry-interval-ms=1000

# --- Kafka Configuration ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.admin.fail-fast=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=true

# Resili\u00EAncia e Idempot\u00EAncia (Production Ready)
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.retries=${KAFKA_PRODUCER_RETRIES:2147483647}
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

spring.kafka.consumer.group-id=circulou-backend-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=br.com.circulou.circulou_backend.model.event

# --- Pagination Configuration ---
circulou.paginacao.default-size=${CIRCULOU_PAGINACAO_DEFAULT_SIZE:20}
circulou.paginacao.max-size=${CIRCULOU_PAGINACAO_MAX_SIZE:100}
